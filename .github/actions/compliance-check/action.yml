name: 'ML Model Compliance Scanner — EU AI Act, NIST AI RMF & ISO 42001'
description: 'Scan your ML evaluation setup against EU AI Act Annex IV, NIST AI RMF, and ISO 42001. Generates a structured compliance gap report as a pipeline artifact on every push.'

inputs:
  assessment-path:
    description: 'Path to the assessment JSON file (profile + inputs)'
    required: false
    default: '.gapsight/assessment.json'
  knowledge-base-path:
    description: 'Path to the GapSight knowledge base JSON. Defaults to the bundled KB.'
    required: false
    default: ''
  fail-on:
    description: 'Risk level that causes the action to fail. One of: CRITICAL, HIGH, MEDIUM, NONE'
    required: false
    default: 'HIGH'

outputs:
  passed:
    description: 'Whether the compliance check passed (true/false)'
  risk-level:
    description: 'Overall risk level (CRITICAL, HIGH, MEDIUM, LOW)'
  report-json:
    description: 'Path to the JSON report artifact'

runs:
  using: 'node24'
  main: 'dist/index.js'
