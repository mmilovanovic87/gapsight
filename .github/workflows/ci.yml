name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  language-policy:
    name: Language Policy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test language policy script
        run: bash scripts/test-language-policy.sh
      - name: Check language policy
        run: bash scripts/check-language-policy.sh

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: language-policy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx vitest run
      - name: Run gapsight-core tests with coverage
        run: cd gapsight-core && npm test -- --coverageThreshold='{"global":{"branches":80,"functions":90,"lines":75,"statements":75}}'
      - run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        run: npx playwright test --config=playwright.config.js

  compliance-check:
    name: Compliance Check (self-test)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run compliance check
        id: compliance
        uses: ./.github/actions/compliance-check
        with:
          assessment-path: '.gapsight/assessment.example.json'
          fail-on: 'NONE'
      - name: Print compliance outputs
        run: |
          echo "Passed: ${{ steps.compliance.outputs.passed }}"
          echo "Risk level: ${{ steps.compliance.outputs.risk-level }}"
